plugins:
    jsonLogs:
      command: sh
      args:
        - -c
        - kubectl logs --follow --timestamps --context="$CONTEXT" --namespace="$NAMESPACE" "$RESOURCE_NAME/$NAME" | sed -u 's/^\([^ ]*\) {/{"time":"\1",/' | hl --paging=never -e -x always; echo "--- Logs ended. Press Ctrl+C to exit. ---"; sleep infinity
      description: Prettified json logs
      scopes:
        - daemonset
        - deploy
        - job
        - pod
        - replicaset
        - service
        - statefulset
      shortCut: Ctrl-L
